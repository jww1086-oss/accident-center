[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = {role = ["admin"]} # Only for SPAs, but for static site we use below

[plugins]
# No plugins needed for simple static site

[template.environment]
# Environment variables

# Pretty URLs
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
