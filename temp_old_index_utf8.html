        function renderPagination() {
            const pagination = document.getElementById('publicPagination');
            if (!pagination) return;

            const totalPages = Math.ceil(filteredPublicItems.length / itemsPerPage);
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button class="pg-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i data-lucide="chevron-left"></i></button>`;
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, startPage + 4);

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="pg-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            html += `<button class="pg-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i data-lucide="chevron-right"></i></button>`;
            
            pagination.innerHTML = html;
        }

        window.applyFilters = function() {

            const checkedValues = Array.from(document.querySelectorAll('input[name="region"]:checked')).map(cb => cb.value);

            const type = document.getElementById('filterType').value;

            filteredPublicItems = allPublicItems.filter(item => {

                if (!isNational && checkedValues.length > 0) {

                }
                
                // 3. 諛쒖깮 ?뺥깭 (?ㅼ썙??諛??댁슜 寃??
                if (type && !(item.keyword + (item.contents || '')).includes(type)) return false;
                
                if (industry && p.industry !== industry) return false;

                return true;
            });

        // 湲곌컙 ???좏깮 ?몃뱾??        window.handleQuickPeriod = function() {
            const preset = document.getElementById('filterPeriodQuick').value;
            if (!preset) return;

            const now = new Date();
            const end = new Date();
            let start = new Date();

            switch(preset) {
                case '1w': start.setDate(now.getDate() - 7); break;
                case '1m': start.setMonth(now.getMonth() - 1); break;
                case '1y': start.setFullYear(now.getFullYear() - 1); break;
                case '2y': start.setFullYear(now.getFullYear() - 2); break;
                case '3y': start.setFullYear(now.getFullYear() - 3); break;
            }

            const formatDate = (date) => date.toISOString().split('T')[0];
            
            document.getElementById('filterStartDate').value = formatDate(start);
            document.getElementById('filterEndDate').value = formatDate(end);
            
            window.applyFilters();
        };
