<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주광역사고조사센터 - 자료실</title>
    <link rel="stylesheet" href="style.css?v=36">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=36" defer></script>
</head>

<body>
    <header>

        <div class="header-main">
            <div class="header-main-inner">
                <div class="logo">
                    <a href="/">
                        <img src="assets/logo.png" alt="로고">
                        <span class="logo-text">광주광역사고조사센터</span>
                    </a>
                </div>
                <div class="header-tools">
                    <button type="button" class="admin-toggle">관리자 로그인</button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i data-lucide="menu"></i>
                        <span class="menu-text">메뉴</span>
                    </button>
                </div>
            </div>
        </div>
        <nav class="gnb-container">
            <ul class="gnb">
                <li><a href="index.html">홈</a></li>
                <li><a href="center-intro.html">센터소개</a></li>
                <li><a href="disasters.html">중대재해현황</a></li>
                <li><a href="notice.html">알림마당</a></li>
                <li class="active"><a href="library.html">자료실</a></li>
                <li><a href="qna.html">질의응답</a></li>
            </ul>
        </nav>
    </header>

    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">자료실</div>
            <ul class="sidebar-menu">
                <li><a href="library.html" class="active"><i data-lucide="book-open"
                            style="width:18px; margin-right:10px;"></i> 전문자료실</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tab 1: 기술자료 -->
            <div id="lib-tech" class="tab-content active-tab">
                <div class="page-title-area">
                    <div class="breadcrumb">
                        <i data-lucide="home" class="breadcrumb-home-icon"></i>
                        <span>자료실</span>
                        <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                        <span>기술자료</span>
                    </div>
                    <div class="page-title-row">
                        <h2 class="page-main-title">기술자료</h2>
                        <button class="open-add-modal btn-admin-add admin-only" style="display:none; padding:4px 8px; font-size:11px; background:var(--primary-color); color:white; border-radius:4px; border:none; cursor:pointer;">등록</button>
                    </div>
                </div>

                <div class="resource-grid">
                    <!-- Cards will be dynamically rendered here by library.js -->
                </div>
            </div>

            <!-- Tab 2: 안전매뉴얼 -->
            <div id="lib-manual" class="tab-content">
                <div class="page-title-area">
                    <div class="breadcrumb">
                        <i data-lucide="home" class="breadcrumb-home-icon"></i>
                        <span>자료실</span>
                        <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                        <span>자료실 목록</span>
                    </div>
                    <div class="page-title-row">
                        <h2 class="page-main-title">안전매뉴얼</h2>
                        <button class="open-add-modal btn-admin-add admin-only" style="display:none; padding:4px 8px; font-size:11px; background:var(--primary-color); color:white; border-radius:4px; border:none; cursor:pointer;">등록</button>
                    </div>
                </div>

                <div class="resource-grid">
                    <!-- Cards will be dynamically rendered here by library.js -->
                </div>
            </div>
        </main>
    </div>

    <!-- 자료 등록 모달 -->
    <div class="modal-overlay" id="adminAddModal" style="display: none; align-items:center; justify-content:center; z-index:9999;">
        <div class="admin-modal" style="width: 400px; max-height:90vh; overflow-y:auto; text-align: left; padding: 25px; border-radius: 8px;">
            <h3 style="margin-bottom: 20px; font-size: 18px; color: #1e293b;">신규 자료 등록</h3>
            <form id="adminAddForm">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">자료 구분</label>
                    <select id="resType" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <option value="tech">기술자료</option>
                        <option value="manual">안전매뉴얼</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">자료 포맷</label>
                    <select id="resFormat" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <option value="PDF">PDF</option>
                        <option value="HWP">HWP</option>
                        <option value="DOCX">DOCX</option>
                        <option value="XLSX">XLSX</option>
                        <option value="ZIP">ZIP</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">자료 제목</label>
                    <input type="text" id="resTitle" placeholder="예: 2026 건설안전 가이드" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">구글 드라이브 링크 (또는 파일 ID)</label>
                    <input type="text" id="resLink" placeholder="https://drive.google.com/file/d/..." style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;" required>
                    <p style="font-size:12px; color:#e74c3c; margin-top:5px; font-weight:bold;">⚠️ URL을 복사해 넣으면 직접 다운로드 기술이 자동 적용됩니다.</p>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" id="closeAddModal" style="padding: 10px 15px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer;">취소</button>
                    <button type="submit" style="padding: 10px 15px; background: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="library.js?v=36"></script>
    <script>if(window.lucide) lucide.createIcons();</script>
</body>

</html>
