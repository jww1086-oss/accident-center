<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주광역사고조사센터 - 질의응답</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="header-main">
            <div class="header-main-inner">
                <div class="logo">
                    <a href="index.html">
                        <img src="assets/logo.png" alt="로고">
                        <span class="logo-text">광주광역사고조사센터</span>
                    </a>
                </div>
                <div class="header-tools">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </div>
        </div>
        <nav class="gnb-container"><ul class="gnb">
            <li><a href="center-intro.html">센터소개</a></li>
            <li><a href="disasters.html">관내 중대재해</a></li>
            <li><a href="notice.html">공지사항</a></li>
            <li><a href="library.html">자료실</a></li>
            <li class="active"><a href="qna.html">질의응답</a></li>
        </ul></nav>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">알림마당</div>
            <ul class="sidebar-menu">
                <li><a href="notice.html"><i data-lucide="bell"></i> 공지사항</a></li>
                <li><a href="qna.html" class="active"><i data-lucide="help-circle"></i> 질의응답</a></li>
                <li><a href="library.html"><i data-lucide="folder-open"></i> 자료실</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-title-area">
                <div class="breadcrumb">
                    <i data-lucide="home" class="breadcrumb-home-icon"></i>
                    <span>알림마당</span>
                    <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                    <span>질의응답</span>
                </div>
                <div class="page-title-row">
                    <h2 class="page-main-title">질의응답</h2>
                    <div class="page-actions">
                        <button class="qna-write-btn" id="openModalBtn">
                            <i data-lucide="pen-tool"></i> 질문하기
                        </button>
                    </div>
                </div>
            </div>

            <div class="board-container">
                <table class="board-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">번호</th>
                            <th style="width: 100px;">상태</th>
                            <th>제목</th>
                            <th style="width: 120px;">작성자</th>
                            <th style="width: 120px;">등록일</th>
                        </tr>
                    </thead>
                    <tbody id="qnaList">
                        <!-- Questions will be loaded here -->
                        <tr>
                            <td colspan="5" style="padding: 100px 0; color: #94A3B8;">질문을 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Question Submission -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="qna-modal">
            <h3>질문하기</h3>
            <form id="qnaForm">
                <div class="form-group">
                    <label for="author">작성자</label>
                    <input type="text" id="author" name="author" placeholder="성함을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="content">질문 내용</label>
                    <textarea id="content" name="content" rows="6" placeholder="궁문하신 내용을 상세히 적어주세요" required></textarea>
                </div>
                <div class="qna-form-actions">
                    <button type="button" class="btn-cancel" id="closeModalBtn">취소</button>
                    <button type="submit" class="btn-submit">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 광주광역사고조사센터. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="qna-script.js"></script>
</body>
</html>
