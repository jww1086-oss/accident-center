    <script src="script.js?v=36" defer></script>
</head>

<body class="sub-page">
    <header>

        <div class="header-main">
            <div class="header-main-inner">
                <div class="logo">
                    <a href="/">
                        <img src="assets/logo.png" alt="광주광역시">
                        <span class="logo-text">광주광역사고조사센터</span>
                    </a>
                </div>
                <div class="header-tools">
                    <button class="search-icon-btn" id="searchToggle">
                        <i data-lucide="search"></i>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </div>
        </div>
        <nav class="gnb-container">
            <ul class="gnb">
                <li><a href="index.html">홈</a></li>
                <li><a href="center-intro.html">센터소개</a></li>
                <li><a href="disasters.html">중대재해현황</a></li>
                <li><a href="notice.html">알림마당</a></li>
                <li><a href="library.html">자료실</a></li>
                <li class="active"><a href="qna.html">질의응답</a></li>
            </ul>
            <!-- 모바일 전용 관리자 로그인 영역 -->
            <div class="mobile-admin-area">
                <button type="button" class="admin-toggle">
                    <i data-lucide="shield-check"></i> 관리자 로그인
                </button>
            </div>
        </nav>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">질의응답</div>
            <ul class="sidebar-menu">
                <li><a href="qna.html" class="active"><i data-lucide="message-circle"></i> 질의응답</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="page-title-area">
                <div class="breadcrumb">
                    <i data-lucide="home" class="breadcrumb-home-icon"></i>
                    <span>질의응답</span>
                    <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                    <span>질의응답</span>
                </div>
                <div class="page-title-row">
                    <h2 class="page-main-title">질의응답</h2>
                    <div class="page-actions">
                        <button class="qna-write-btn" id="openModalBtn">
                            <i data-lucide="pen-tool"></i> 질문하기
                        </button>
                    </div>
                </div>
            </div>

            <div class="board-container">
                <table class="board-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">번호</th>
                            <th style="width: 100px;">상태</th>
                            <th>제목</th>
                            <th style="width: 120px;">작성자</th>
                            <th style="width: 120px;">등록일</th>
                        </tr>
                    </thead>
                    <tbody id="qnaList">
                        <tr>
                            <td colspan="5" style="padding: 100px 0; color: #94A3B8;">질문을 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Question Submission -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="qna-modal">
            <h3>질문하기</h3>
            <form id="qnaForm">
                <div class="form-group">
                    <label for="q_author">작성자</label>
                    <input type="text" id="q_author" name="q_author" placeholder="성함을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="q_title">제목</label>
                    <input type="text" id="q_title" name="q_title" placeholder="제목을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="q_content">질문 내용</label>
                    <textarea id="q_content" name="q_content" rows="6" placeholder="궁금하신 내용을 상세히 적어주세요"
                        required></textarea>
                </div>
                <div class="qna-form-actions">
                    <button type="button" class="btn-cancel" id="closeModalBtn">취소</button>
                    <button type="submit" class="btn-submit">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-top">
                <nav class="footer-nav">
                    <a href="#">개인정보처리방침</a>
                    <a href="#">이용약관</a>
                    <a href="#">이메일무단수집거부</a>
                </nav>
            </div>

                <p class="copyright">© 2026 광주광역사고조사센터. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="qna-script.js?v=36"></script>
</body>

</html>
