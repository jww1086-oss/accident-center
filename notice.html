<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주광역사고조사센터 - 공지사항</title>
    <link rel="stylesheet" href="style.css?v=36">
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=36" defer></script>
</head>

<body>
    <header>

        <div class="header-main">
            <div class="header-main-inner">
                <div class="logo">
                    <a href="/">
                        <img src="assets/logo.png" alt="로고">
                        <span class="logo-text">광주광역사고조사센터</span>
                    </a>
                </div>
                <div class="header-tools">
                    <button class="search-icon-btn" id="searchToggle">
                        <i data-lucide="search"></i>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </div>
        </div>
        <nav class="gnb-container">
            <ul class="gnb">
                <li><a href="index.html">홈</a></li>
                <li><a href="center-intro.html">센터소개</a></li>
                <li><a href="disasters.html">중대재해현황</a></li>
                <li class="active"><a href="notice.html">알림마당</a></li>
                <li><a href="library.html">자료실</a></li>
                <li><a href="qna.html">질의응답</a></li>
            </ul>
            <!-- 모바일 전용 관리자 로그인 영역 -->
            <div class="mobile-admin-area">
                <button type="button" class="admin-toggle">
                    <i data-lucide="shield-check"></i> 관리자 로그인
                </button>
            </div>
        </nav>
    </header>

    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">알림마당</div>
            <ul class="sidebar-menu">
                <li><a href="notice.html" class="active"><i data-lucide="bell"
                            style="width:18px; margin-right:10px;"></i> 공지사항</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- 목록 뷰 -->
            <div id="notice-list-view" class="tab-content active-tab" style="display: block;">
                <div class="page-title-area">
                    <div class="breadcrumb">
                        <i data-lucide="home" class="breadcrumb-home-icon"></i>
                        <span>알림마당</span>
                        <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                        <span>공지사항 목록</span>
                    </div>
                    <div class="page-title-row" style="display: flex; align-items: center;">
                        <h2 class="page-main-title">알림마당</h2>
                        <button class="open-notice-add admin-only-notice" style="display:none; margin-left:20px; padding:8px 16px; background:#e74c3c; color:white; border-radius:4px; font-weight:bold; border:none; cursor:pointer;"><i data-lucide="plus" style="width:16px;"></i> 글쓰기</button>
                        <div class="page-actions" style="margin-left: auto;">
                            <button class="action-btn" title="공유하기"><i data-lucide="share-2"></i></button>
                            <button class="action-btn" title="인쇄하기"><i data-lucide="printer"></i></button>
                        </div>
                    </div>
                </div>

                <div class="board-container">
                    <table class="board-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">번호</th>
                                <th>제목</th>
                                <th style="width: 120px;">작성일</th>
                                <th style="width: 100px;">조회수</th>
                            </tr>
                        </thead>
                        <tbody id="notice-list-body">
                            <tr>
                                <td colspan="4">데이터를 불러오는 중입니다...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 단일 상세 뷰 (Supabase 동적 삽입) -->
            <div id="notice-detail-view" class="tab-content" style="display: none;">
                <div class="page-title-area">
                    <div class="breadcrumb">
                        <i data-lucide="home" class="breadcrumb-home-icon"></i>
                        <span>공지사항</span>
                        <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                        <span>공지사항 상세보기</span>
                    </div>
                    <div class="page-title-row">
                        <h2 class="page-main-title" id="detail-title">로딩 중...</h2>
                        <div class="page-actions">
                            <button class="action-btn" title="공유하기"><i data-lucide="share-2"></i></button>
                            <button class="action-btn" title="인쇄하기"><i data-lucide="printer"></i></button>
                            <button class="action-btn" onclick="backToNoticeList()" title="목록으로"><i data-lucide="list"></i></button>
                        </div>
                    </div>
                </div>

                <div class="notice-content-area">
                    <div class="notice-section-item" style="line-height: 1.8; color: #334155; font-size: 1.05rem;" id="detail-content">
                        <!-- 본문 내용이 여기에 주입됩니다 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 광주광역사고조사센터. All Rights Reserved.</p>
        </div>
    <!-- 글쓰기 모달 -->
    <div class="modal-overlay" id="noticeAddModal" style="display: none; align-items:center; justify-content:center; z-index:9999;">
        <div class="admin-modal" style="width: 800px; max-width:95%; text-align: left; padding: 25px; border-radius: 8px;">
            <h3 style="margin-bottom: 20px; font-size: 18px; color: #1e293b;">새 공지사항 작성</h3>
            <form id="noticeAddForm">
                <div style="margin-bottom: 15px;">
                    <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:#e74c3c; font-weight:bold; cursor:pointer;">
                        <input type="checkbox" id="notIsNotice" style="width:16px; height:16px;">
                        [중요 공지] 상단에 고정하기
                    </label>
                </div>
                <div style="display:flex; gap:15px; margin-bottom:15px;">
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">카테고리</label>
                        <select id="notCategory" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;">
                            <option value="일반공지">일반공지</option>
                            <option value="법령안내">법령안내</option>
                            <option value="중대재해속보">중대재해속보</option>
                        </select>
                    </div>
                    <div style="flex: 3;">
                        <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">글 제목</label>
                        <input type="text" id="notTitle" placeholder="제목을 입력하세요" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px;" required>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">본문 내용 (Markdown 지원)</label>
                    <textarea id="notContent" rows="10" placeholder="공지 내용을 자세히 작성하세요 (줄바꿈이 그대로 반영됩니다)" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; resize:vertical; font-family:inherit;"></textarea>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; color:#475569;">전문 자료 첨부 (선택)</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="file" id="notFile" accept=".pdf,.zip,.hwp,.docx,.xlsx" style="border: 1px solid #cbd5e1; padding: 8px; border-radius: 4px; width: 100%; background: #f8fafc;">
                    </div>
                    <p style="font-size:12px; color:#94a3b8; margin-top:5px;">* 첨부된 파일은 보안 스토리지에 자동 암호화되어 안전하게 배포됩니다.</p>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" id="closeNoticeAdd" style="padding: 10px 20px; border: 1px solid #cbd5e1; background: white; border-radius: 4px; cursor: pointer;">취소</button>
                    <button type="submit" style="padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase & Expert Tools CDN -->
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="notice-script.js?v=36"></script>
    <script>if(window.lucide) lucide.createIcons();</script>
</body>

</html>
